name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Generate the gitignored Firebase config from the repo secret.
      # FIREBASE_CONFIG is the web config as a JSON object, e.g.
      # {"apiKey":"...","authDomain":"...","projectId":"...", ...}
      - name: Inject Firebase config
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: |
          mkdir -p src/environments
          printf 'export const firebaseConfig = %s as const;\n' "$FIREBASE_CONFIG" \
            > src/environments/firebase.config.ts

      # base-href must match the repo name for project pages.
      - run: npx ng build --base-href=/beach-checklist/

      # Stop GitHub Pages from running Jekyll on the output.
      - run: touch dist/beach-checklist/browser/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/beach-checklist/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
