name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Generate the gitignored Firebase config from the repo secret.
      # FIREBASE_CONFIG must be a single JSON object, e.g.
      # {"apiKey":"...","authDomain":"...","projectId":"...", ...}
      - name: Inject Firebase config
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: |
          mkdir -p src/environments
          if [ -z "$FIREBASE_CONFIG" ]; then
            echo "::error::FIREBASE_CONFIG secret is empty or not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          node -e '
            const c = process.env.FIREBASE_CONFIG;
            let parsed;
            try { parsed = JSON.parse(c); }
            catch (e) {
              console.error("::error::FIREBASE_CONFIG is not valid JSON. It must be a single JSON object with quoted keys, e.g. {\"apiKey\":\"...\",\"projectId\":\"...\"}. Parse error: " + e.message);
              process.exit(1);
            }
            require("fs").writeFileSync(
              "src/environments/firebase.config.ts",
              "export const firebaseConfig = " + JSON.stringify(parsed) + " as const;\n"
            );
            console.log("Wrote firebase.config.ts with keys: " + Object.keys(parsed).join(", "));
          '

      # base-href must match the repo name for project pages.
      - run: npx ng build --base-href=/beach-checklist/

      # Stop GitHub Pages from running Jekyll on the output.
      - run: touch dist/beach-checklist/browser/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/beach-checklist/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
